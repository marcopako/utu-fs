name: Generate IPTV Playlist

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4 pytube

    - name: Run script
      run: |
        python youtube_m3ugrabber.py

    - name: Commit playlist
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add *.m3u
        git commit -m "update playlist" || echo "no changes"
        git push
