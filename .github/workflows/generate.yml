name: Generate IPTV Playlist
permissions:
  contents: write
on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests pytube

      - name: Run script
        run: |
          python youtube_m3ugrabber.py youtube_channel_info.txt youtube.m3u

      - name: Commit playlist
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add youtube.m3u
          git commit -m "update playlist" || echo "no changes"
          git push
